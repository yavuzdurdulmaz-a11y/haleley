name: Update Radyonet M3U Playlist

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı (UTC) çalışır
  workflow_dispatch: # Actions sekmesinden manuel tetiklemeye izin verir

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v3

    - name: Python Ortamını Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scraper Scriptini Çalıştır
      run: python radyonet_scraper.py

    - name: Değişiklikleri Commit Et ve Pushla
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add radyonet.m3u
        # Sadece değişiklik varsa commit at, yoksa hata vermeden geç
        git commit -m "M3U listesi otomatik olarak güncellendi" || exit 0
        git push
