name: Günlük PuhuTV Dizi M3U

on:
  schedule:
    - cron: '0 4 * * *' # Her gün gece 04:00'da (UTC) çalışır
  workflow_dispatch: # Manuel tetikleme butonu

# 403 hatasını çözen yazma yetkisi
permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tqdm

      - name: Scraper Scriptini Çalıştır
        run: python puhutv_scraper.py

      - name: M3U Dosyasını Kaydet ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add puhutv_diziler.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Güncelleme: PuhuTV Tüm Diziler M3U Listesi" && git push)
