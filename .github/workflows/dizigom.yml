name: DiziGom Otomatik Tarayıcı

on: 
  workflow_dispatch:

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install httpx selectolax pyyaml

      - name: Tarayıcıyı Çalıştır (JS Unpacker Dahil)
        shell: python
        run: |
          import asyncio
          import yaml
          import json
          import os
          import re
          import string
          import httpx
          from selectolax.parser import HTMLParser
          from contextlib import suppress

          # ==========================================
          # AYARLAR (GÖMÜLÜ YAML KODU)
          # ==========================================
          YML_CONFIG = """
          settings:
            timeout: 15
            output_dir: "outputs"
            category_max_pages: 1  # Tüm siteyi sömürmek için 999 yap

          plugin:
            name: "DiziGom"
            main_url: "https://dizigom104.com"

          categories:
            "Aksiyon": "https://dizigom104.com/tur/aksiyon/"
            "Bilim Kurgu": "https://dizigom104.com/tur/bilim-kurgu/"
            "Fantastik": "https://dizigom104.com/tur/fantastik/"
            "Komedi": "https://dizigom104.com/tur/komedi/"
          """

          def unpack_js(packed_js: str) -> str:
              match = re.search(r"}\('(.*?)',\s*(\d+),\s*(\d+),\s*'(.*?)'\.split\('\|'\)", packed_js)
              if not match: return packed_js
              
              p, a, c, k = match.groups()
              a, c = int(a), int(c)
              k = k.split('|')
              
              def base_N(num, b):
                  if num == 0: return "0"
                  chars = string.digits + string.ascii_letters
                  res = ""
                  while num > 0:
                      res = chars[num % b] + res
                      num //= b
                  return res
                  
              dict_k = {}
              for i in range(c):
                  dict_k[base_N(i, a)] = k[i] if k[i] else base_N(i, a)
                  
              def replace_func(m):
                  word = m.group(0)
                  return dict_k.get(word, word)
                  
              unpacked = re.sub(r'\b\w+\b', replace_func, p)
              return unpacked.replace("\\'", "'")

          class DiziGomScraper:
              def __init__(self, config: dict):
                  self.main_url = config['plugin']['main_url'].rstrip('/')
                  self.timeout = config['settings'].get('timeout', 15)
                  self.client = httpx.AsyncClient(
                      timeout=self.timeout,
                      follow_redirects=True,
                      headers={
                          "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
                          "Referer": f"{self.main_url}/",
                          "Accept-Language": "tr-TR,tr;q=0.9,en-US;q=0.8,en;q=0.7"
                      }
                  )

              def fix_url(self, url: str) -> str:
                  if not url: return ""
                  if url.startswith("http"): return url
                  if url.startswith("//"): return f"https:{url}"
                  if url.startswith("/"): return f"{self.main_url}{url}"
                  return f"{self.main_url}/{url}"

              async def crawl_category(self, endpoint: str, max_pages: int) -> list:
                  items = []
                  for page in range(1, max_pages + 1):
                      url = f"{endpoint.rstrip('/')}/page/{page}/" if page > 1 else endpoint
                      try:
                          response = await self.client.get(url)
                          tree = HTMLParser(response.text)
                      except Exception: continue
                      
                      nodes = tree.css("div.episode-box, div.single-item")
                      if not nodes: break
                          
                      for node in nodes:
                          title_node = node.css_first("div.serie-name a, div.categorytitle a")
                          title = title_node.text(strip=True) if title_node else "Bilinmeyen"
                          href = self.fix_url(title_node.attributes.get("href")) if title_node else ""
                          img_tag = node.css_first("img")
                          poster = self.fix_url(img_tag.attributes.get("src")) if img_tag else ""
                          
                          if href and "/dizi/" in href:
                              items.append({"title": title, "url": href, "poster": poster})
                          
                      has_next = any("Sonraki" in a.text(strip=True) or "Next" in a.text(strip=True) for a in tree.css("div.pagination a, ul.page-numbers a"))
                      if not has_next and page > 1: break
                  return items

              async def get_series_info(self, url: str) -> dict:
                  try:
                      response = await self.client.get(url)
                      tree = HTMLParser(response.text)
                  except Exception: return {"source_url": url, "episodes": []}

                  title_node = tree.css_first("div.serieTitle h1")
                  title = title_node.text(strip=True) if title_node else "Bilinmeyen Dizi"
                  
                  poster_style = tree.css_first("div.seriePoster")
                  poster = ""
                  if poster_style and poster_style.attributes.get("style"):
                      p_match = re.search(r"url\(['\"]?([^'\")]+)['\"]?\)", poster_style.attributes.get("style"))
                      if p_match: poster = self.fix_url(p_match.group(1))

                  episodes = []
                  for ep_node in tree.css("div.bolumust"):
                      ep_a = ep_node.css_first("a")
                      if not ep_a: continue
                      
                      ep_href = ep_a.attributes.get("href")
                      ep_name_node = ep_node.css_first("div.bolum-ismi")
                      ep_name = ep_name_node.text(strip=True) if ep_name_node else "Bölüm"
                      
                      ep_title_node = ep_node.css_first("div.baslik")
                      ep_title_text = ep_title_node.text(strip=True) if ep_title_node else ""
                      
                      season, episode = 1, 1
                      parts = ep_title_text.split()
                      if len(parts) >= 3:
                          season = int(parts[0].replace(".", "")) if parts[0].replace(".", "").isdigit() else 1
                          episode = int(parts[2].replace(".", "")) if parts[2].replace(".", "").isdigit() else 1

                      if ep_href:
                          episodes.append({
                              "season": season, "episode": episode, "title": ep_name or f"{season}. Sezon {episode}. Bölüm",
                              "url": self.fix_url(ep_href), "video_links": []
                          })

                  return {"title": title, "poster": poster, "source_url": url, "episodes": episodes[::-1]}

              async def get_video_links(self, url: str) -> list:
                  results = []
                  try:
                      response = await self.client.get(url)
                      tree = HTMLParser(response.text)
                      script_node = tree.css_first("div#content script")
                      if not script_node: return results
                      
                      json_data = json.loads(script_node.text(strip=True))
                      content_url = json_data.get("contentUrl", "")
                      if not content_url: return results
                      
                      play_url = content_url.replace("https://", "https://play.")
                      iframe_resp = await self.client.get(play_url, headers={"Referer": f"{self.main_url}/"})
                      
                      packed_match = re.search(r"(eval\s*\(\s*function[\s\S]+?)\s*<\/script>", iframe_resp.text)
                      if not packed_match: return results
                      
                      unpacked = unpack_js(packed_match.group(1))
                      source_json = re.search(r'sources:\[\{(.*?)\}', unpacked)
                      if source_json:
                          source_str = "{" + source_json.group(1).replace("\/", "/") + "}"
                          file_match = re.search(r'"?file"?\s*:\s*["\']([^"\']+)["\']', source_str)
                          if file_match:
                              results.append(self.fix_url(file_match.group(1)))
                  except Exception: pass
                  return list(set(results))

              async def close(self):
                  await self.client.aclose()

          def save_as_json(data: list, filepath: str):
              with open(filepath, "w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=4)

          def save_as_m3u(data: list, filepath: str):
              lines = ["#EXTM3U\n"]
              for item in data:
                  series_title = item.get("title", "Bilinmeyen Dizi")
                  poster = item.get("poster", "")
                  for ep in item.get("episodes", []):
                      ep_title = ep.get("title", f"S{ep.get('season', 1):02d}E{ep.get('episode', 1):02d}")
                      for video_link in ep.get("video_links", []):
                          extinf = f'#EXTINF:-1 tvg-logo="{poster}" group-title="{series_title}", {series_title} - {ep_title}\n'
                          lines.append(extinf)
                          lines.append(f"{video_link}\n")
              with open(filepath, "w", encoding="utf-8") as f:
                  f.writelines(lines)

          def sanitize_filename(name: str) -> str:
              return re.sub(r'[\\/*?:"<>|]', "", name).strip()

          async def main():
              print("[*] DiziGom JS Unpacker & Tarayıcı Başlatılıyor...")
              config = yaml.safe_load(YML_CONFIG)
              output_dir = config['settings'].get('output_dir', 'outputs')
              max_pages = config['settings'].get('category_max_pages', 1)
              os.makedirs(output_dir, exist_ok=True)

              scraper = DiziGomScraper(config)
              categories = config.get('categories', {})

              for cat_name, cat_endpoint in categories.items():
                  print(f"\n[*] Taranıyor: {cat_name}")
                  items = await scraper.crawl_category(cat_endpoint, max_pages)
                  category_data = []
                  
                  for item in items:
                      details = await scraper.get_series_info(item['url'])
                      item["episodes"] = details.get("episodes", [])
                      for ep in item["episodes"]:
                          ep["video_links"] = await scraper.get_video_links(ep["url"])
                      category_data.append(item)

                  safe_cat_name = sanitize_filename(cat_name)
                  json_path = os.path.join(output_dir, f"{safe_cat_name}.json")
                  m3u_path = os.path.join(output_dir, f"{safe_cat_name}.m3u")
                  save_as_json(category_data, json_path)
                  save_as_m3u(category_data, m3u_path)
                  print(f"[+] {cat_name} başarıyla kaydedildi.")

              await scraper.close()
              print("\n[✓] Bütün İşlemler Tamamlandı!")

          asyncio.run(main())

      - name: Çıktıları İndirilebilir Dosya (Artifact) Olarak Yükle
        uses: actions/upload-artifact@v4
        with:
          name: DiziGom-Listeleri
          path: outputs/
