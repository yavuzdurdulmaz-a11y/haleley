name: M3U Listesini Guncelle

on:
  schedule:
    - cron: '0 6 * * *' # Her gün saat 06:00'da (UTC) çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Çek
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scraper Scriptini Çalıştır
      run: python scraper.py

    - name: Değişiklikleri Kaydet ve GitHub'a Gönder
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # müzikmp3.m3u dosyası oluştuysa depoya gönder
        if [ -f "müzikmp3.m3u" ]; then
          git add müzikmp3.m3u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: Tüm site tarandı ve M3U listesi yenilendi" && git push)
          echo "İşlem başarıyla tamamlandı, tüm liste çekildi!"
        else
          echo "UYARI: müzikmp3.m3u dosyası bulunamadı! Sayfada MP3 yok veya bağlantı koptu."
          exit 1
        fi
