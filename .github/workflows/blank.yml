name: PuhuTV Dizi Arşivi Güncelleyici

on:
  schedule:
    - cron: '0 3 * * *' # Her gün gece 03:00'da (UTC) çalışır
  workflow_dispatch: # GitHub üzerinden manuel tetiklemeye izin verir

# Bota dosyayı depoya geri yükleyebilmesi (push) için yazma yetkisi veriyoruz (403 hatasının çözümü)
permissions:
  contents: write

jobs:
  build-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: PuhuTV Python Scriptini Çalıştır
        run: python puhutv_diziler.py

      - name: M3U Dosyasını Kaydet ve Pushla
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add puhutv_diziler.m3u
          # Eğer dosyada değişiklik varsa commit atıp gönderir, değişiklik yoksa hata vermez
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Otomatik Güncelleme: PuhuTV Tüm Diziler M3U" && git push)
