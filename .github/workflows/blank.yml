name: Günlük PuhuTV Dizi M3U Güncelleyici

on:
  schedule:
    - cron: '0 4 * * *' # Her gün UTC saatiyle 04:00'te otomatik çalışır
  workflow_dispatch: # GitHub arayüzünden senin manuel tetikleyebilmen için

# 403 Erişim Reddedildi hatasını çözen altın vuruş: Bota yazma yetkisi veriyoruz
permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Hazırla
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tqdm

      - name: PuhuTV Scraper Scriptini Çalıştır
        run: python puhutv_scraper.py

      - name: Değişiklikleri Kaydet ve GitHub'a Pushla
        run: |
          # Git ayarlarında bot kimliğini kullanıyoruz
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Oluşan m3u dosyasını ekle
          git add puhutv_diziler.m3u
          
          # Eğer dosyada yeni bir değişiklik varsa commit at ve pushla, yoksa hata verme
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Otomatik Güncelleme: PuhuTV M3U Listesi" && git push)
