name: Mp3IndirDur Otomatik Scraper

on:
  schedule:
    # cron: Her 6 saatte bir çalıştırır. (00:00, 06:00, 12:00, 18:00)
    # Python kodu 5 saat çalışıp kapanacak, 1 saat boşluk kalacak.
    - cron: '0 */6 * * *'
  workflow_dispatch: # Actions sekmesinden "Run workflow" butonu ile manuel başlatabilmen için

jobs:
  scrape_and_save:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun m3u ve json dosyalarını repoya kaydedebilmesi için gerekli izin

    steps:
      - name: Repoyu Klonla (Checkout)
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4

      - name: Scraper'ı Çalıştır (Max 5 Saat)
        run: python mp3_cekici.py

      - name: Değişiklikleri GitHub'a Kaydet (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Yeni oluşan dosyaları git'e ekle
          git add state.json sarkilar.json sarkilar.m3u || true
          
          # Eğer değişiklik varsa commit yap, yoksa hata vermeden geç
          git diff --staged --quiet || git commit -m "🤖 Otomatik Güncelleme: Kaldığı yerden şarkılar çekildi"
          
          # ÇAKIŞMA ÇÖZÜMÜ: Çakışma olursa botun verilerini (-X theirs) zorla kabul et ve üzerine yaz
          git pull --rebase -X theirs origin main
          
          # Repoya geri gönder
          git push
