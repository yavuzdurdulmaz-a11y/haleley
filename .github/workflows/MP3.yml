name: M3U Listesini Guncelle

on:
  schedule:
    - cron: '0 6 * * *' # Her gün sabah saat 06:00'da çalışır (UTC)
  workflow_dispatch: # Actions sekmesinden manuel olarak tetiklemek için buton ekler

permissions:
  contents: write # Botun depoya dosyayı yazabilmesi için gerekli yetki

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Çek (Checkout Repository)
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scraper Scriptini Çalıştır
      run: python scraper.py

    - name: Değişiklikleri Kaydet ve GitHub'a Gönder (Commit & Push)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add playlist.m3u
        
        # Eğer dosyada değişiklik varsa commit at ve pushla, yoksa hata verme geç
        git diff --quiet && git diff --staged --quiet || (git commit -m "Otomatik Güncelleme: M3U listesi yenilendi" && git push)
